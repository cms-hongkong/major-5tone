<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音階辨識偵探 - 專業教學版</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --bg-gradient: linear-gradient(135deg, #1e3c72, #2a5298);
            --card-bg: rgba(255, 255, 255, 0.98);
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2d3436;
        }

        .container {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 2rem;
            width: 95%;
            max-width: 650px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.2rem;
            margin-top: 0;
            margin-bottom: 15px;
        }

        /* 偵探手冊提示框 */
        .reference-box {
            background: #f1f2f6;
            border-left: 8px solid #341f97;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
            display: inline-block;
            width: 90%;
        }

        .ref-item {
            font-size: 1.1rem;
            margin: 5px 0;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .ref-label {
            display: inline-block;
            width: 100px;
            padding: 2px 8px;
            border-radius: 5px;
            margin-right: 10px;
            color: white;
            font-size: 0.9rem;
            text-align: center;
        }

        .label-major { background-color: #ff9f43; }
        .label-penta { background-color: #1dd1a1; }

        .difficulty-status {
            font-weight: bold;
            color: #576574;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .stat-value { display: block; font-size: 1.1rem; font-weight: 800; color: #341f97; }
        .stat-label { font-size: 0.7rem; color: #95a5a6; }

        #display-area {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 40px 10px;
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 2px dashed #dfe6e9;
        }

        .note-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            animation: pop 0.3s ease-out forwards;
        }

        @keyframes pop {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }

        button {
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-major { background: #ff9f43; color: white; }
        .btn-pentatonic { background: #1dd1a1; color: white; }
        .btn-next { background: #54a0ff; color: white; display: none; }
        .btn-restart { background: #ee5253; color: white; margin-top: 20px; }

        button:hover { transform: translateY(-2px); opacity: 0.9; }

        #message { font-size: 1.3rem; font-weight: bold; margin: 15px 0; height: 1.5rem; }
        .hidden { display: none !important; }

        .highlight-hint { color: #d63031; font-weight: 900; }
    </style>
</head>
<body>

<div class="container">
    <div id="play-screen">
        <h1>音階辨識偵探</h1>

        <div class="reference-box">
            <div class="difficulty-status" id="mode-text">模式：入門測試</div>
            <div class="ref-item">
                <span class="ref-label label-major">大調音階</span> 
                d r m <span class="highlight-hint">f</span> s l <span class="highlight-hint">t</span> d'
            </div>
            <div class="ref-item">
                <span class="ref-label label-penta">五聲音階</span> 
                d r m s l d'
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card"><span class="stat-label">關卡</span><span class="stat-value" id="level">1</span></div>
            <div class="stat-card"><span class="stat-label">分數</span><span class="stat-value" id="score">0</span></div>
            <div class="stat-card"><span class="stat-label">連擊</span><span class="stat-value" id="combo">0</span></div>
            <div class="stat-card"><span class="stat-label">正確</span><span class="stat-value" id="correct">0</span></div>
        </div>

        <div id="display-area"></div>
        <div id="message"></div>

        <div class="btn-group" id="action-buttons">
            <button class="btn-major" onclick="checkAnswer('major')">大調音階</button>
            <button class="btn-pentatonic" onclick="checkAnswer('pentatonic')">五聲音階</button>
        </div>
        
        <div class="btn-group">
            <button class="btn-next" id="next-btn" onclick="nextQuestion()">下一題 ➔</button>
        </div>
    </div>

    <div id="game-over" class="hidden">
        <h2 style="font-size: 2.5rem; color: #341f97;">測驗結束！</h2>
        <p>最終得分：<span id="final-score" style="font-size: 2rem; font-weight: 900; color: #ff6b6b;">0</span></p>
        <button class="btn-restart" onclick="resetGame()">再挑戰一次</button>
    </div>
</div>

<script>
    const notesInfo = {
        'd': '#eb4d4b', 'r': '#f0932b', 'm': '#f1c40f',
        'f': '#badc58', 's': '#7ed6df', 'l': '#e056fd', 't': '#686de0'
    };

    const majorFull = ['d', 'r', 'm', 'f', 's', 'l', 't'];
    const pentatonicFull = ['d', 'r', 'm', 's', 'l'];

    let state = { level: 0, score: 0, combo: 0, correctCount: 0, currentAnswer: '', isAnswered: false };

    function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

    function nextQuestion() {
        state.level++;
        if (state.level > 10) { showGameOver(); return; }

        state.isAnswered = false;
        document.getElementById('level').innerText = state.level;
        document.getElementById('message').innerText = '';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('action-buttons').classList.remove('hidden');

        const modeText = document.getElementById('mode-text');
        state.currentAnswer = Math.random() > 0.5 ? 'major' : 'pentatonic';
        let displayNotes = [];

        if (state.level <= 2) {
            modeText.innerText = "模式：入門 (完整音階順序)";
            displayNotes = state.currentAnswer === 'major' ? [...majorFull] : [...pentatonicFull];
        } else {
            modeText.innerText = "模式：偵探 (隨機抽取音符)";
            const count = Math.random() > 0.5 ? 4 : 5;
            if (state.currentAnswer === 'pentatonic') {
                displayNotes = shuffle([...pentatonicFull]).slice(0, count);
            } else {
                let mustHave = shuffle(['f', 't'])[0];
                let others = majorFull.filter(n => n !== mustHave);
                displayNotes = shuffle([mustHave, ...shuffle(others).slice(0, count - 1)]);
            }
        }
        renderNotes(displayNotes);
    }

    function renderNotes(notes) {
        const area = document.getElementById('display-area');
        area.innerHTML = '';
        notes.forEach((note, i) => {
            setTimeout(() => {
                const div = document.createElement('div');
                div.className = 'note-circle';
                div.style.backgroundColor = notesInfo[note];
                div.innerText = note;
                area.appendChild(div);
            }, i * 100);
        });
    }

    function checkAnswer(choice) {
        if (state.isAnswered) return;
        state.isAnswered = true;
        const msg = document.getElementById('message');
        if (choice === state.currentAnswer) {
            state.score += (100 + (state.combo * 20));
            state.correctCount++;
            state.combo++;
            msg.innerText = "✔️ 正確！";
            msg.style.color = "#2ecc71";
        } else {
            state.combo = 0;
            msg.innerText = "❌ 答錯了，請再觀察！";
            msg.style.color = "#e74c3c";
        }
        document.getElementById('score').innerText = state.score;
        document.getElementById('combo').innerText = state.combo;
        document.getElementById('correct').innerText = state.correctCount;
        document.getElementById('action-buttons').classList.add('hidden');
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function showGameOver() {
        document.getElementById('play-screen').classList.add('hidden');
        document.getElementById('game-over').classList.remove('hidden');
        document.getElementById('final-score').innerText = state.score;
    }

    function resetGame() {
        state = { level: 0, score: 0, combo: 0, correctCount: 0, currentAnswer: '', isAnswered: false };
        document.getElementById('play-screen').classList.remove('hidden');
        document.getElementById('game-over').classList.add('hidden');
        nextQuestion();
    }

    window.onload = nextQuestion;
</script>

</body>
</html>
