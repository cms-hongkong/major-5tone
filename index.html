<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音階辨識偵探 - 進階版</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg-gradient: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2d3436;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 2.5rem;
            width: 90%;
            max-width: 650px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            text-align: center;
            border: 5px solid rgba(255, 255, 255, 0.5);
        }

        h1 {
            color: #1e272e;
            font-size: 2.8rem;
            margin: 0;
            letter-spacing: 2px;
        }

        .difficulty-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .easy { background: #dff9fb; color: #130f40; }
        .hard { background: #fab1a0; color: #d63031; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 18px;
            border: 1px solid #eee;
        }

        .stat-value {
            display: block;
            font-size: 1.3rem;
            font-weight: 900;
            color: #341f97;
        }

        .stat-label { font-size: 0.75rem; color: #576574; text-transform: uppercase; }

        #display-area {
            background: #ffffff;
            border-radius: 25px;
            padding: 50px 20px;
            margin: 25px 0;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.05);
            border: 2px solid #f1f2f6;
        }

        .note-circle {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 800;
            font-size: 1.4rem;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 25px;
        }

        button {
            padding: 18px 35px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-major { background: linear-gradient(to bottom, #ff9f43, #f39c12); color: white; }
        .btn-pentatonic { background: linear-gradient(to bottom, #1dd1a1, #10ac84); color: white; }
        .btn-next { background: #2e86de; color: white; display: none; }
        .btn-restart { background: #ee5253; color: white; margin-top: 20px; }

        button:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        button:active { transform: translateY(-1px); }

        #message {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 15px 0;
            height: 1.5rem;
        }

        .hidden { display: none !important; }
        
        .rainbow-title {
            background: linear-gradient(to right, #ef5350, #f48fb1, #7e57c2, #2196f3, #26c6da, #43a047, #eeff41, #f9a825, #ff5722);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3.5rem;
            font-weight: 900;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="play-screen">
        <div id="difficulty-indicator" class="difficulty-badge easy">入門模式：完整音階</div>
        <h1>音階辨識偵探</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">關卡</span>
                <span class="stat-value" id="level">1</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">分數</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">連擊</span>
                <span class="stat-value" id="combo">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">正確</span>
                <span class="stat-value" id="correct">0</span>
            </div>
        </div>

        <div id="display-area"></div>

        <div id="message"></div>

        <div class="btn-group" id="action-buttons">
            <button class="btn-major" onclick="checkAnswer('major')">大調音階</button>
            <button class="btn-pentatonic" onclick="checkAnswer('pentatonic')">五聲音階</button>
        </div>
        
        <div class="btn-group">
            <button class="btn-next" id="next-btn" onclick="nextQuestion()">下一關 ➔</button>
        </div>
    </div>

    <div id="game-over" class="hidden">
        <h2 class="rainbow-title">任務完成！</h2>
        <p style="font-size: 1.2rem;">恭喜偵探，你的表現非常出色！</p>
        <div class="stats-grid" style="grid-template-columns: repeat(2, 1fr);">
            <div class="stat-card">
                <span class="stat-label">最終得分</span>
                <span class="stat-value" id="final-score">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">最高連擊</span>
                <span class="stat-value" id="max-combo">0</span>
            </div>
        </div>
        <button class="btn-restart" onclick="resetGame()">再次接受挑戰</button>
    </div>
</div>

<script>
    const notesInfo = {
        'Do': '#eb4d4b', 'Re': '#f0932b', 'Mi': '#f1c40f',
        'Fa': '#badc58', 'Sol': '#7ed6df', 'La': '#e056fd', 'Ti': '#686de0'
    };

    const majorFull = ['Do', 'Re', 'Mi', 'Fa', 'Sol', 'La', 'Ti'];
    const pentatonicFull = ['Do', 'Re', 'Mi', 'Sol', 'La'];

    let state = {
        level: 0,
        score: 0,
        combo: 0,
        maxCombo: 0,
        correctCount: 0,
        currentAnswer: '',
        isAnswered: false
    };

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function nextQuestion() {
        state.level++;
        if (state.level > 10) {
            showGameOver();
            return;
        }

        state.isAnswered = false;
        document.getElementById('level').innerText = state.level;
        document.getElementById('message').innerText = '';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('action-buttons').classList.remove('hidden');

        // 更新難度標籤
        const badge = document.getElementById('difficulty-indicator');
        if (state.level <= 2) {
            badge.innerText = "入門模式：完整音階";
            badge.className = "difficulty-badge easy";
        } else {
            badge.innerText = "偵探模式：尋找關鍵音 (Fa/Ti)";
            badge.className = "difficulty-badge hard";
        }

        // 生成題目
        state.currentAnswer = Math.random() > 0.5 ? 'major' : 'pentatonic';
        let displayNotes = [];

        if (state.level <= 2) {
            // 前兩題顯示完整且順序固定
            displayNotes = state.currentAnswer === 'major' ? [...majorFull] : [...pentatonicFull];
        } else {
            // 第3題起：顯示 4-5 音，且隨機順序
            const count = Math.random() > 0.5 ? 4 : 5;
            
            if (state.currentAnswer === 'pentatonic') {
                // 五聲音階：從 drmsl 隨機抽，絕對沒有 f, t
                displayNotes = shuffle([...pentatonicFull]).slice(0, count);
            } else {
                // 大調音階：必須包含 Fa 或 Ti
                let mustHave = shuffle(['Fa', 'Ti'])[0]; // 隨機選一個必出音
                let others = majorFull.filter(n => n !== mustHave);
                displayNotes = [mustHave, ...shuffle(others).slice(0, count - 1)];
            }
            displayNotes = shuffle(displayNotes); // 最後再次打亂順序
        }

        renderNotes(displayNotes);
    }

    function renderNotes(notes) {
        const area = document.getElementById('display-area');
        area.innerHTML = '';
        notes.forEach((note, i) => {
            setTimeout(() => {
                const div = document.createElement('div');
                div.className = 'note-circle';
                div.style.backgroundColor = notesInfo[note];
                div.innerText = note;
                area.appendChild(div);
            }, i * 100);
        });
    }

    function checkAnswer(choice) {
        if (state.isAnswered) return;
        state.isAnswered = true;

        const msg = document.getElementById('message');
        if (choice === state.currentAnswer) {
            state.score += (100 + (state.combo * 20));
            state.correctCount++;
            state.combo++;
            if (state.combo > state.maxCombo) state.maxCombo = state.combo;
            msg.innerText = "🎯 偵探判斷正確！";
            msg.style.color = "#2ecc71";
        } else {
            state.combo = 0;
            msg.innerText = "⚠️ 判斷失誤，再觀察一下！";
            msg.style.color = "#e74c3c";
        }

        document.getElementById('score').innerText = state.score;
        document.getElementById('combo').innerText = state.combo;
        document.getElementById('correct').innerText = state.correctCount;
        
        document.getElementById('action-buttons').classList.add('hidden');
        document.getElementById('next-btn').style.display = 'inline-block';
        if (state.level === 10) document.getElementById('next-btn').innerText = "結算成績";
    }

    function showGameOver() {
        document.getElementById('play-screen').classList.add('hidden');
        document.getElementById('game-over').classList.remove('hidden');
        document.getElementById('final-score').innerText = state.score;
        document.getElementById('max-combo').innerText = state.maxCombo;
    }

    function resetGame() {
        state = { level: 0, score: 0, combo: 0, maxCombo: 0, correctCount: 0, currentAnswer: '', isAnswered: false };
        document.getElementById('play-screen').classList.remove('hidden');
        document.getElementById('game-over').classList.add('hidden');
        document.getElementById('next-btn').innerText = "下一關 ➔";
        nextQuestion();
    }

    window.onload = nextQuestion;
</script>

</body>
</html>
