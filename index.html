<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音階辨識偵探 - 樂理挑戰遊戲</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2d3436;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2rem;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            border: 4px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            color: #4834d4;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle {
            color: #686de0;
            font-weight: bold;
            margin-bottom: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #fff;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .stat-value {
            display: block;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.8rem;
            color: #95a5a6;
        }

        /* 音階顯示區域 */
        #display-area {
            background: #f1f2f6;
            border-radius: 20px;
            padding: 40px 20px;
            margin: 20px 0;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 3px dashed #ced6e0;
        }

        .note-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* 色彩繽紛的按鈕 */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        .btn-major { background: #FF9F43; color: white; }
        .btn-pentatonic { background: #2ECC71; color: white; }
        .btn-next { background: #54a0ff; color: white; display: none; }
        .btn-restart { background: #ff6b6b; color: white; }

        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        button:active { transform: translateY(0); }

        #message {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 15px 0;
            height: 2rem;
        }

        .hidden { display: none !important; }

        /* 完成畫面 */
        #game-over {
            padding: 20px;
        }

        .rainbow-text {
            background-image: linear-gradient(to left, violet, indigo, blue, green, yellow, orange, red);
            -webkit-background-clip: text;
            color: transparent;
            font-size: 3rem;
            font-weight: 900;
        }
    </style>
</head>
<body>

<div class="container" id="game-container">
    <div id="play-screen">
        <h1>音階辨識偵探</h1>
        <p class="subtitle">大調音階 (7音) vs 五聲音階 (5音) 挑戰</p>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">關卡</span>
                <span class="stat-value" id="level">1</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">分數</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">連擊</span>
                <span class="stat-value" id="combo">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">正確率</span>
                <span class="stat-value" id="accuracy">0%</span>
            </div>
        </div>

        <p><strong>🔎 請問這是什麼音階？</strong></p>
        
        <div id="display-area">
            </div>

        <div id="message"></div>

        <div class="btn-group" id="action-buttons">
            <button class="btn-major" onclick="checkAnswer('major')">大調音階</button>
            <button class="btn-pentatonic" onclick="checkAnswer('pentatonic')">五聲音階</button>
        </div>
        
        <div class="btn-group">
            <button class="btn-next" id="next-btn" onclick="nextQuestion()">下一題 ➔</button>
        </div>
    </div>

    <div id="game-over" class="hidden">
        <h2 class="rainbow-text">遊戲完成！</h2>
        <div class="stats-grid" style="grid-template-columns: repeat(2, 1fr); margin: 30px 0;">
            <div class="stat-card">
                <span class="stat-label">最終分數</span>
                <span class="stat-value" id="final-score" style="font-size: 2rem;">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">最高連擊</span>
                <span class="stat-value" id="max-combo" style="font-size: 2rem;">0</span>
            </div>
        </div>
        <button class="btn-restart" onclick="resetGame()">再玩一次</button>
    </div>
</div>

<script>
    // 遊戲數據
    let state = {
        level: 1,
        score: 0,
        combo: 0,
        maxCombo: 0,
        correctCount: 0,
        totalQuestions: 0,
        currentAnswer: '',
        isAnswered: false
    };

    const notesInfo = {
        'Do': '#FF6B6B',
        'Re': '#FF9F43',
        'Mi': '#FFE66D',
        'Fa': '#1DD1A1',
        'Sol': '#4ECDC4',
        'La': '#54A0FF',
        'Ti': '#A55EEA'
    };

    const majorScale = ['Do', 'Re', 'Mi', 'Fa', 'Sol', 'La', 'Ti'];
    const pentatonicScale = ['Do', 'Re', 'Mi', 'Sol', 'La'];

    function initGame() {
        nextQuestion();
    }

    function nextQuestion() {
        if (state.totalQuestions >= 10) {
            showGameOver();
            return;
        }

        state.isAnswered = false;
        state.totalQuestions++;
        
        // 隨機決定答案
        state.currentAnswer = Math.random() > 0.5 ? 'major' : 'pentatonic';
        let notes = state.currentAnswer === 'major' ? [...majorScale] : [...pentatonicScale];
        
        // 打亂順序增加難度 (可選)
        // notes.sort(() => Math.random() - 0.5);

        renderNotes(notes);
        
        document.getElementById('level').innerText = state.totalQuestions;
        document.getElementById('message').innerText = '';
        document.getElementById('message').style.color = 'inherit';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('action-buttons').classList.remove('hidden');
    }

    function renderNotes(notes) {
        const area = document.getElementById('display-area');
        area.innerHTML = '';
        
        notes.forEach((note, index) => {
            setTimeout(() => {
                const div = document.createElement('div');
                div.className = 'note-circle';
                div.style.backgroundColor = notesInfo[note];
                div.innerText = note;
                area.appendChild(div);
            }, index * 100);
        });
    }

    function checkAnswer(choice) {
        if (state.isAnswered) return;
        state.isAnswered = true;

        const msg = document.getElementById('message');
        const actionBtns = document.getElementById('action-buttons');
        const nextBtn = document.getElementById('next-btn');

        if (choice === state.currentAnswer) {
            state.score += (100 + (state.combo * 20));
            state.correctCount++;
            state.combo++;
            if (state.combo > state.maxCombo) state.maxCombo = state.combo;
            msg.innerText = "✨ 太棒了！答對了！ ✨";
            msg.style.color = "#27ae60";
        } else {
            state.combo = 0;
            msg.innerText = "❌ 哎呀！再觀察看看喔！";
            msg.style.color = "#e74c3c";
        }

        updateStats();
        actionBtns.classList.add('hidden');
        nextBtn.style.display = 'inline-block';
        
        if (state.totalQuestions === 10) {
            nextBtn.innerText = "查看結果 ➔";
        }
    }

    function updateStats() {
        document.getElementById('score').innerText = state.score;
        document.getElementById('combo').innerText = state.combo;
        const acc = Math.round((state.correctCount / state.totalQuestions) * 100);
        document.getElementById('accuracy').innerText = acc + '%';
    }

    function showGameOver() {
        document.getElementById('play-screen').classList.add('hidden');
        document.getElementById('game-over').classList.remove('hidden');
        document.getElementById('final-score').innerText = state.score;
        document.getElementById('max-combo').innerText = state.maxCombo;
    }

    function resetGame() {
        state = {
            level: 1, score: 0, combo: 0, maxCombo: 0,
            correctCount: 0, totalQuestions: 0, currentAnswer: '', isAnswered: false
        };
        updateStats();
        document.getElementById('play-screen').classList.remove('hidden');
        document.getElementById('game-over').classList.add('hidden');
        nextQuestion();
    }

    // 啟動遊戲
    window.onload = initGame;
</script>

</body>
</html>
